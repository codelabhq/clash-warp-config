name: build-config

on:
  push:
    paths:
      - 'proxies/**'
      - 'settings/**'
      - 'scripts/build_config.py'
      - '.github/workflows/build-config.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - run: pip install pyyaml

      - run: python scripts/build_config.py

      - name: Commit regenerated configs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: sync inline proxies into config/*.yaml [skip ci]"
            git push
          fi

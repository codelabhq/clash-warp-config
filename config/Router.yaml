dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: false
  default-nameserver:
    - 1.1.1.1
    - 1.0.0.1
  nameserver:
    - https://cloudflare-dns.com/dns-query
  nameserver-policy:
    "+.lan": system
    "msftconnecttest.com": system
    "msftncsi.com": system
    "kion.ru": system

keep-alive-idle: 15
keep-alive-interval: 15

profile:
  store-selected: true

routing-mark: 2

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - '+.lan'
    - '+.local'
    - '+.push.apple.com'
    - '+.apple.com'
    - '+.msftconnecttest.com'
    - '+.3gppnetwork'


    type: select
    hidden: true
    proxies:
      - REJECT
  - name: ⏭️ Пропуск
    type: select
    hidden: true
    proxies:
      - PASS

rules:
  - RULE-SET,private-ips,DIRECT,no-resolve
  - RULE-SET,private-domains,DIRECT

  # === TELEGRAM ===
  - RULE-SET,telegram-ip,Telegram
  - RULE-SET,telegram,Telegram

  # === БЛОКИРОВКА БЕСПОЛЕЗНОЙ РЕКЛАМЫ TWITCH (ТО, ЧТО ЕЩЁ МОЖНО ЗАБЛОКИРОВАТЬ) ===
  - DOMAIN-SUFFIX,adserver.twitch.tv,REJECT
  - DOMAIN-SUFFIX,ads.twitch.tv,REJECT
  - DOMAIN-KEYWORD,twitch-ads,REJECT
  - DOMAIN-KEYWORD,amazon-adsystem,REJECT

  # === ОБХОД ОГРАНИЧЕНИЯ КАЧЕСТВА TWITCH (ЧЕРЕЗ ПРОКСИ) ===
  - DOMAIN-SUFFIX,usher.ttvnw.net,Обход качества Twitch
  - DOMAIN-SUFFIX,gql.twitch.tv,Обход качества Twitch

  # === ОСТАЛЬНОЙ ТРАФИК TWITCH (ВИДЕО, ЧАТ) — НАПРЯМУЮ ===
  - DOMAIN-SUFFIX,twitch.tv,DIRECT
  - DOMAIN-SUFFIX,ttvnw.net,DIRECT
  - DOMAIN-SUFFIX,jtvnw.net,DIRECT

  # === РУССКИЕ САЙТЫ И ПРИЛОЖЕНИЯ ===
  - RULE-SET,category-ru,DIRECT
  - RULE-SET,whitelist,DIRECT

  # === ОСТАЛЬНЫЕ СЕРВИСЫ ===
  - RULE-SET,netflix,Геоблок
  - RULE-SET,google-ai,AI
  - RULE-SET,discord-domain,Discord

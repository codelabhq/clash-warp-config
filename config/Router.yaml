dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: false
  default-nameserver:
    - 1.1.1.1
    - 1.0.0.1
  nameserver:
    - https://cloudflare-dns.com/dns-query
  nameserver-policy:
    "+.lan": system
    "msftconnecttest.com": system
    "msftncsi.com": system
    "kion.ru": system

keep-alive-idle: 15
keep-alive-interval: 15

profile:
  store-selected: true

routing-mark: 2

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - '+.lan'
    - '+.local'
    - '+.push.apple.com'
    - '+.apple.com'
    - '+.msftconnecttest.com'
    - '+.3gppnetwork'

warp-common: &warp-common
  type: wireguard
  ip: 172.16.0.2
  ipv6: 2606:4700:110:8e80:88b7:6faa:1bd1:91e6
  private-key: # вставьте ваш ключ
  public-key: bmXOC+F1FxEMF9dyiK2H5/1SUtzH0JuVo51h2wPfgyo=
  allowed-ips: ['0.0.0.0/0']
  udp: true
  mtu: 1280
  remote-dns-resolve: true
  dns: [1.1.1.1, 1.0.0.1, 2606:4700:4700::1111, 2606:4700:4700::1001]
  amnezia-wg-option:
   jc: 4
   jmin: 40
   jmax: 70
   s1: 0
   s2: 0
   h1: 1
   h2: 2
   h4: 3
   h3: 4
   i1: <b >

x-default-interval: &default-interval 86400
x-check-interval: &check-interval 300
x-health-url: &health-url http://speed.cloudflare.com/

proxy-providers:
  geo-endpoint:
    type: http
    url: https://raw.githubusercontent.com/codelabhq/clash-warp-config/refs/heads/main/proxies/geo-endpoint.yaml

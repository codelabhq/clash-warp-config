mode: rule
# Proxy Mode: MIXED (TCP via TPROXY port 7894, UDP via TUN)
tproxy-port: 7894
tun:
  enable: true
  device: clash-tun
  stack: system
  auto-route: false
  auto-redirect: false
  auto-detect-interface: false
ipv6: false
log-level: error
allow-lan: false
unified-delay: true
tcp-concurrent: true
external-controller: 0.0.0.0:9090
external-ui: ./ui
external-ui-url: "https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip"


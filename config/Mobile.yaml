rules:
  - RULE-SET,private-ips,DIRECT,no-resolve
  - RULE-SET,private-domains,DIRECT

  # === TELEGRAM ===
  - RULE-SET,telegram-ip,Telegram
  - RULE-SET,telegram,Telegram

  # === БЛОКИРОВКА БЕСПОЛЕЗНОЙ РЕКЛАМЫ TWITCH (ТО, ЧТО ЕЩЁ МОЖНО ЗАБЛОКИРОВАТЬ) ===
  - DOMAIN-SUFFIX,adserver.twitch.tv,REJECT
  - DOMAIN-SUFFIX,ads.twitch.tv,REJECT
  - DOMAIN-KEYWORD,twitch-ads,REJECT
  - DOMAIN-KEYWORD,amazon-adsystem,REJECT

  # === ОБХОД ОГРАНИЧЕНИЯ КАЧЕСТВА TWITCH (ЧЕРЕЗ ПРОКСИ) ===
  - DOMAIN-SUFFIX,usher.ttvnw.net,Twitch
  - DOMAIN-SUFFIX,gql.twitch.tv,Twitch

  # === ОСТАЛЬНОЙ ТРАФИК TWITCH (ВИДЕО, ЧАТ) — НАПРЯМУЮ ===
  - DOMAIN-SUFFIX,twitch.tv,DIRECT
  - DOMAIN-SUFFIX,ttvnw.net,DIRECT
  - DOMAIN-SUFFIX,jtvnw.net,DIRECT

  # === РУССКИЕ САЙТЫ И ПРИЛОЖЕНИЯ ===
  - RULE-SET,ru-apps,DIRECT
  - RULE-SET,category-ru,DIRECT
  - RULE-SET,whitelist,DIRECT

  # === ОСТАЛЬНЫЕ СЕРВИСЫ ===
  - RULE-SET,netflix,Геоблок
  - RULE-SET,google-ai,AI
  - RULE-SET,discord-domain,Discord
  - RULE-SET,discord-ip,Discord
  - RULE-SET,Claude,AI
  - RULE-SET,tiktok,Геоблок
  - RULE-SET,whatsapp,WhatsApp,no-resolve
  - RULE-SET,youtube,YouTube
  - RULE-SET,porno,Геоблок
  - RULE-SET,torrent,Torrent
  - RULE-SET,tools,Геоблок
  - RULE-SET,socials,Геоблок
  - RULE-SET,music,Геоблок
  - RULE-SET,Ubisoft,Игры
  - RULE-SET,EA,Игры
  - RULE-SET,Blizzard,Игры
  - RULE-SET,Epic,Игры
  - DOMAIN-KEYWORD,notion,Геоблок
  - DOMAIN-SUFFIX,ntc.party,Cloudflare

  # Вручную направляем Activision и матчмейкинг через нужный прокси
  - DOMAIN-SUFFIX,activision.com,Игры
  - DOMAIN-SUFFIX,callofduty.com,Игры
  - DOMAIN-SUFFIX,demonware.net,Игры
  - DOMAIN-SUFFIX,mw3.demonware.net,Игры

  # Домены для которых жалко создавать RULE-SET
  - DOMAIN-SUFFIX,apple.com,Cloudflare

  # === ОБХОД БЛОКИРОВОК РКН ===
  - RULE-SET,HODCA,Cloudflare

  # === ВСЁ ОСТАЛЬНОЕ НАПРЯМУЮ ===
  - RULE-SET,direct-ips,DIRECT
  - MATCH,DIRECT